<!DOCTYPE html>
<html>

<head>

  <title>Forgot Password</title>

  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
  >

</head>

<body>

  <div class="auth-container">

    <div class="auth-box">

      <h2>Forgot Password</h2>

      <form method="POST">

        <input
          type="text"
          name="username"
          placeholder="Enter Username"
          required
        >

        <input
          type="text"
          name="security_answer"
          placeholder="What is your favorite color?"
          required
        >

        <button type="submit">
          Verify
        </button>

      </form>

      <p>

        <a href="/">
          Back to Login
        </a>

      </p>

    </div>

  </div>

</body>

</html>
